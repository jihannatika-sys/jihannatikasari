<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - StudentTaskr</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        .register-container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo { font-weight: bold; font-size: 24px; margin-bottom: 10px; }
        .logo span { color: #4db6ac; }
        
        h2 { color: #333; margin-bottom: 5px; }
        p { color: #777; font-size: 14px; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: #444; }
        .form-group input { 
            width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 8px; outline: none; transition: 0.3s; 
        }
        .form-group input:focus { border-color: #4db6ac; }

        .btn-register {
            width: 100%; padding: 12px; background-color: #333; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }
        .btn-register:hover { background-color: #000; }

        .footer-link { margin-top: 20px; font-size: 13px; color: #666; }
        .footer-link a { color: #4db6ac; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo"><span>✓</span> StudentTaskr</div>
        <h2>Buat Akun Baru</h2>
        <p>Mulai atur tugas kuliahmu dengan lebih teratur hari ini.</p>

        <form>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama lengkap" required>
            </div>
            <div class="form-group">
                <label>Email Mahasiswa</label>
                <input type="email" placeholder="nim@student.hamzanwadi.ac.id" required>
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" placeholder="Buat kata sandi minimal 8 karakter" required>
            </div>
            <button type="submit" class="btn-register">Daftar Sekarang</button>
        </form>

        <div class="footer-link">
            Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </div>
    </div>

</body>
</html>
